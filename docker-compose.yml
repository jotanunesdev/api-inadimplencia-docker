services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq-inadimplencia
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    healthcheck:
      # check_port_connectivity só retorna OK quando o listener AMQP (5672)
      # está realmente aceitando conexões, evitando que a API suba antes do
      # RabbitMQ estar pronto e receba "Connection refused".
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q check_port_connectivity"]
      interval: 5s
      timeout: 15s
      retries: 20
      start_period: 30s

  api-inadimplencia:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - HTTP_PROXY=${HTTP_PROXY}
        - HTTPS_PROXY=${HTTPS_PROXY}
        - NO_PROXY=${NO_PROXY}
    image: api-inadimplencia:local
    container_name: api-inadimplencia
    environment:
      ASPNETCORE_ENVIRONMENT: ${INAD_ENVIRONMENT:-Development}
      SqlServer__ConnectionString: Server=${INAD_DB_SERVER},${INAD_DB_PORT};Database=${INAD_DB_DATABASE};User Id=${INAD_DB_USER};Password=${INAD_DB_PASSWORD};Encrypt=${INAD_DB_ENCRYPT};TrustServerCertificate=${INAD_DB_TRUST_CERT}
      SqlServer__CommandTimeoutSeconds: 30
      AuditDb__ConnectionString: Server=${AUDIT_DB_SERVER},${AUDIT_DB_PORT};Database=${AUDIT_DB_DATABASE};User Id=${AUDIT_DB_USER};Password=${AUDIT_DB_PASSWORD};Encrypt=${AUDIT_DB_ENCRYPT};TrustServerCertificate=${AUDIT_DB_TRUST_CERT}
      AuditDb__CommandTimeoutSeconds: 60
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
      RabbitMQ__VirtualHost: /
      Fluig__Url: ${INAD_FLUIG_URL}
      Fluig__User: ${INAD_FLUIG_USER}
      Fluig__Password: ${INAD_FLUIG_PASSWORD}
      Rm__Coligada: ${INAD_RM_COLIGADA}
      Rm__ReportColigada: ${INAD_RM_REPORT_COLIGADA}
      Rm__ParamColigada: ${INAD_RM_PARAM_COLIGADA}
      Rm__ReportId: ${INAD_RM_REPORT_ID}
      Rm__ReportCode: ${INAD_RM_REPORT_CODE:-}
      Rm__ReportName: ${INAD_RM_REPORT_NAME:-Ficha Financeira}
      Rm__Debug: ${INAD_RM_DEBUG}
      SerasaPefin__Env: ${INAD_SERASA_ENV}
      SerasaPefin__AuthUrl: ${INAD_SERASA_AUTH_URL}
      SerasaPefin__CollectionBaseUrl: ${INAD_SERASA_COLLECTION_BASE_URL}
      SerasaPefin__ClientId: ${INAD_SERASA_CLIENT_ID}
      SerasaPefin__ClientSecret: ${INAD_SERASA_CLIENT_SECRET}
      SerasaPefin__LogonVinculado: ${INAD_SERASA_LOGON_VINCULADO}
      SerasaPefin__CnpjContrato: ${INAD_SERASA_CNPJ_CONTRATO}
      SerasaPefin__UseUatDefaults: ${INAD_SERASA_USE_UAT_DEFAULTS}
      SerasaPefin__CreditorDocument: ${INAD_SERASA_CREDITOR_DOCUMENT}
      SerasaPefin__AreaInformante: ${INAD_SERASA_AREA_INFORMANTE}
      Auth__AuthServerBaseUrl: ${INAD_AUTH_URL:-http://host.docker.internal:3013}
      Auth__InternalOrigin: ${INAD_AUTH_INTERNAL_ORIGIN:-https://fluig.jotanunes.com}
      Cors__AllowedOrigins: ${INAD_CORS_ALLOWED_ORIGINS}
      Cors__AllowedMethods: ${INAD_CORS_ALLOWED_METHODS:-GET,POST,PUT,DELETE,OPTIONS}
      Cors__AllowedHeaders: ${INAD_CORS_ALLOWED_HEADERS:-Accept,Authorization,Cache-Control,Content-Type,Origin,Pragma,X-Requested-With,X-User-Code,X-User-Name,X-Username,X-Source-System,X-System-Name,X-Client-Id}
      Cors__ExposedHeaders: ${INAD_CORS_EXPOSED_HEADERS:-Content-Disposition,X-Correlation-Id,X-Request-Id}
      Cors__AllowCredentials: ${INAD_CORS_ALLOW_CREDENTIALS:-true}
      Cors__PreflightMaxAgeSeconds: ${INAD_CORS_PREFLIGHT_MAX_AGE_SECONDS:-3600}
      Auth__CredentialsEncryptionKey: ${INAD_CREDENTIALS_ENCRYPTION_KEY}
      Auth__RequireAuthenticatedInadimplencia: ${INAD_REQUIRE_AUTHENTICATED:-true}
      Auth__EntraId__TenantId: ${INAD_ENTRA_TENANT_ID}
      Auth__EntraId__ApiClientId: ${INAD_ENTRA_API_CLIENT_ID}
      Auth__EntraId__Audience: ${INAD_ENTRA_AUDIENCE}
      Auth__EntraId__ClientId: ${INAD_ENTRA_CLIENT_ID}
      Auth__EntraId__ClientSecret: ${INAD_ENTRA_CLIENT_SECRET}
      Auth__EntraId__Scope: ${INAD_ENTRA_SCOPE}
      Auth__EntraId__RedirectUris: ${INAD_ENTRA_REDIRECT_URIS}
      TrafficMonitoring__Enabled: ${INAD_TRAFFIC_MONITORING_ENABLED:-true}
      TrafficMonitoring__ApplicationName: ${INAD_TRAFFIC_APPLICATION_NAME:-api-inadimplencia}
      TrafficMonitoring__SourceSystemHeader: ${INAD_TRAFFIC_SOURCE_SYSTEM_HEADER:-X-Source-System}
      TrafficMonitoring__ChannelCapacity: ${INAD_TRAFFIC_CHANNEL_CAPACITY:-10000}
      TrafficMonitoring__BatchSize: ${INAD_TRAFFIC_BATCH_SIZE:-250}
      TrafficMonitoring__FlushIntervalSeconds: ${INAD_TRAFFIC_FLUSH_INTERVAL_SECONDS:-5}
      TrafficMonitoring__MaxAnalyticsPeriodDays: ${INAD_TRAFFIC_MAX_PERIOD_DAYS:-90}
    ports:
      - "${INAD_PORT:-8080}:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
